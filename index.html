<!DOCTYPE html>

  <meta charset="UTF-8">

  <link rel="stylesheet" href="style.css">
</head>
<body>
  <script>var DEMO_MODE = new URLSearchParams(location.search).get('mode') === 'wasm' ? 'wasm' : 'js';</script>

  <div class="mode-tabs">
    <a class="mode-tab" id="tab-js" href="?mode=js">JS6</a>
    <a class="mode-tab" id="tab-wasm" href="?mode=wasm">C-Version (WASM)</a>
  </div>
  <script>document.getElementById('tab-' + DEMO_MODE).classList.add('active');</script>

  <div class="hint">Press play below to hear some nice chiptunes</div>
  <div class="monitor">
    <div class="vents">
      <div class="vent"></div>
      <div class="vent"></div>
      <div class="vent"></div>
      <div class="vent"></div>
      <div class="vent"></div>
    </div>
    <div class="bezel">
      <canvas id="screen"></canvas>
    </div>
    <div class="mod-player" id="mod-player">
      <button class="mod-btn" id="mod-playpause">&#9654;</button>
      <div class="mod-lcd">
        <div class="mod-title" id="mod-title">Loading...</div>
        <div class="mod-seek-row">
          <input class="mod-seek" id="mod-seek" type="range" min="0" max="1000" value="0">
          <span class="mod-time" id="mod-time">0:00</span>
        </div>
      </div>
    </div>
    <div class="panel">
      <span class="brand">RETROCOMPUTER 500</span>
      <div class="led-row">
        <span class="led-label">PWR</span>

        <span class="led-label">DRV</span>
        <div class="led-drive"></div>

    </div>
  </div>

  <a class="github-link" href="https://github.com/fersab/em-intro" target="_blank">View source on GitHub</a>

  <article class="readme" id="readme"></article>

  <script>
  // load a script tag, call cb when done
  function loadScript(src, cb) {
    var s = document.createElement('script');
    s.src = src;
    if (cb) s.onload = cb;
    document.body.appendChild(s);
  }

  // load scripts in sequence, call cb when all done
  function loadScriptsSeq(srcs, cb) {
    (function next(i) {
      if (i >= srcs.length) { if (cb) cb(); return; }
      loadScript(srcs[i], function() { next(i + 1); });
    })(0);
  }

  // load audio libs (libopenmpt + chiptune2) then mod player
  function loadAudio() {
    var cfg = document.createElement('script');
    cfg.textContent = 'var libopenmpt={locateFile:function(s){return"lib/"+s}};';
    document.body.appendChild(cfg);
    loadScriptsSeq(['lib/libopenmpt.js', 'lib/chiptune2.js', 'mod.js']);
  }

  if (DEMO_MODE === 'js') {
    // --- JS mode: load audio libs synchronously, then effect scripts ---
    document.write('<script>var libopenmpt={locateFile:function(s){return"lib/"+s}}<\/script>');
    document.write('<script src="lib/libopenmpt.js"><\/script>');
    document.write('<script src="lib/chiptune2.js"><\/script>');
    loadScriptsSeq([
      'main.js','graph.js','font.js','sprite.js',
      'floor.js','fire.js','stars.js','logo.js','scroller.js','mod.js'
    ], function() { main_start(); });
  } else {
    // --- WASM mode: load Emscripten-compiled C code, then audio ---
    var cv = document.getElementById('screen');
    cv.width = 480;
    cv.height = 272;
    loadScript('zephyr/web/demo.js', function() {
      createDemo({
        canvas: document.getElementById('screen'),
        locateFile: function(path) { return 'zephyr/web/' + path; },
        print: function(text) { console.log(text); },
        printErr: function(text) { console.warn(text); }
      }).then(loadAudio);
    });
  }
  </script>

  <script>
  // load README.md and render as HTML below the monitor
  fetch('README.md').then(function(r){return r.text()}).then(function(md){
    var el = document.getElementById('readme');
    if (!el || !md) return;

    // extract code blocks first, replace with placeholders
    var codeBlocks = [];
    md = md.replace(/```(\w*)\n([\s\S]*?)```/g, function(m, lang, code) {
      var i = codeBlocks.length;
      codeBlocks.push('<pre><code>' + code.replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;') + '</code></pre>');
      return '\n\nCODEBLOCK_' + i + '\n\n';
    });

    // split into blocks by double newline
    var blocks = md.split(/\n\n+/);
    var html = '';

    for (var b = 0; b < blocks.length; b++) {
      var block = blocks[b].trim();
      if (!block) continue;

      // code block placeholder
      var cbMatch = block.match(/^CODEBLOCK_(\d+)$/);
      if (cbMatch) {
        html += codeBlocks[parseInt(cbMatch[1])];
        continue;
      }

      // heading
      if (/^#{1,3} /.test(block)) {
        var lvl = block.match(/^(#+)/)[1].length;
        var text = block.replace(/^#+\s+/, '');
        var id = text.toLowerCase().replace(/[^a-z0-9]+/g, '-').replace(/(^-|-$)/g, '');
        text = inlineFormat(text);
        html += '<h' + lvl + ' id="' + id + '">' + text + '</h' + lvl + '>';
        continue;
      }

      // list block (unordered or ordered, one level of nesting)
      if (/^[-*] /.test(block) || /^\d+\.\s/.test(block)) {
        var lines = block.split('\n');
        var tag = /^\d+\.\s/.test(block) ? 'ol' : 'ul';
        var items = [];
        var cur = null;
        for (var i = 0; i < lines.length; i++) {
          var line = lines[i];
          if (/^[-*] /.test(line) || /^\d+\.\s/.test(line)) {
            cur = { text: line.replace(/^[-*] /, '').replace(/^\d+\.\s+/, ''), children: [] };
            items.push(cur);
          } else if (/^ +[-*] /.test(line) && cur) {
            cur.children.push(line.replace(/^ +[-*] /, ''));
          } else if (cur) {
            cur.text += ' ' + line.trim();
          }
        }
        html += '<' + tag + '>';
        for (var j = 0; j < items.length; j++) {
          html += '<li>' + inlineFormat(items[j].text);
          if (items[j].children.length > 0) {
            html += '<ul>';
            for (var k = 0; k < items[j].children.length; k++) {
              html += '<li>' + inlineFormat(items[j].children[k]) + '</li>';
            }
            html += '</ul>';
          }
          html += '</li>';
        }
        html += '</' + tag + '>';
        continue;
      }

      // paragraph
      var text = block.replace(/\n/g, ' ');
      html += '<p>' + inlineFormat(text) + '</p>';
    }

    el.innerHTML = html;

    function inlineFormat(s) {
      return s
        // inline code
        .replace(/`([^`]+)`/g, '<code>$1</code>')
        // bold
        .replace(/\*\*(.+?)\*\*/g, '<strong>$1</strong>')
        // italic
        .replace(/\*(.+?)\*/g, '<em>$1</em>')
        // links
        .replace(/\[([^\]]+)\]\(([^)]+)\)/g, '<a href="$2">$1</a>')
        // -- to em dash
        .replace(/ -- /g, ' \u2014 ');
    }
  });
  </script>
</body>
</html>
